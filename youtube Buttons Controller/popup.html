<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Tab Logger</title>
  <style>
    body {

      font-family: Arial, sans-serif;
      padding: 10px;
      height: auto;
      width: 150px;
      background-color: rgb(241, 241, 241);
    }

    .button {
      appearance: none;
      background-color: white;
      border: 2px solid #1A1A1A;
      border-radius: 15px;
      box-sizing: border-box;
      color: #070707;
      cursor: pointer;
      display: inline-block;
      font-family: Roobert, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      font-size: 13px;
      font-weight: 600;
      line-height: normal;
      margin: 0;
      min-height: 15px;
      min-width: 0;
      outline: none;
      padding: 4px 6px;
      text-align: center;
      text-decoration: none;
      transition: all 300ms cubic-bezier(.23, 1, 0.32, 1);
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      width: auto;
      will-change: transform;
    }

    .button:disabled {
      pointer-events: none;
    }

    .button:hover {
      color: #fff;
      background-color: #1A1A1A;
      box-shadow: rgba(0, 0, 0, 0.25) 0 8px 15px;
      transform: translateY(-2px);
    }

    .button:active {
      box-shadow: none;
      transform: translateY(0);
    }

    .div1 {
      grid-gap: 5px;
      display: grid;
    }

    .h3 {
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 16px;
      margin-bottom: 10px;
      text-align: center;
      font-weight: normal;
      color: #000000;
    }
  </style>
</head>

<body>
  <h3 class="h3">First open the specific youtube Tab and click on <strong>GET TAB</strong> :) </h3>
  <div class="div1">
    <button class="button" role="button" id="nextButton">Next</button>
    <button class="button" role="button" id="stopButton">Stop</button>
    <button class="button" role="button" id="backButton">Back</button>
    <button class="button" role="button" id="muteButton">Mute</button>
    <button class="button" role="button" id="getTabButton">Get Tab</button>
  </div>
  <script src="popup.js"></script>
</body>

</html>
